<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="bg" gradientUnits="userSpaceOnUse" cx="360" cy="320" r="720">
      <stop offset="0%"   stop-color="#0f0b2e"/>
      <stop offset="55%"  stop-color="#05041a"/>
      <stop offset="100%" stop-color="#010108"/>
    </radialGradient>

    <radialGradient id="innerGlow" gradientUnits="userSpaceOnUse" cx="360" cy="320" r="190">
      <stop offset="0%"   stop-color="#a5b4fc" stop-opacity="0.35"/>
      <stop offset="55%"  stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0"/>
    </radialGradient>

    <!-- Thread gradients aligned to the actual thread extents.
         Warps run vertically from y=100 to y=540.
         Wefts run horizontally from x=140 to x=580. -->
    <linearGradient id="warp" gradientUnits="userSpaceOnUse" x1="0" y1="100" x2="0" y2="540">
      <stop offset="0%"   stop-color="#7d82e8" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#5E6AD2" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="weft" gradientUnits="userSpaceOnUse" x1="140" y1="0" x2="580" y2="0">
      <stop offset="0%"   stop-color="#4338ca" stop-opacity="0.92"/>
      <stop offset="50%"  stop-color="#6366f1" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="warpHi" gradientUnits="userSpaceOnUse" x1="0" y1="100" x2="0" y2="540">
      <stop offset="0%"   stop-color="#c7d2fe" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#e0e7ff" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="weftHi" gradientUnits="userSpaceOnUse" x1="140" y1="0" x2="580" y2="0">
      <stop offset="0%"   stop-color="#c7d2fe" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#e0e7ff" stop-opacity="0.5"/>
      <stop offset="65%"  stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="fadeMask" gradientUnits="userSpaceOnUse" cx="360" cy="320" r="220">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="88%"  stop-color="#ffffff" stop-opacity="0.725"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.5"/>
    </radialGradient>
    <mask id="weaveFade">
      <rect width="1280" height="640" fill="url(#fadeMask)"/>
    </mask>
    <clipPath id="weaveClip">
      <circle cx="360" cy="320" r="220"/>
    </clipPath>

    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#innerGlow)"/>

  <!-- Woven icon, centered at (360, 320), radius ~220 -->
  <g mask="url(#weaveFade)" clip-path="url(#weaveClip)" transform="rotate(45 360 320)">
    <g stroke="url(#weft)" stroke-width="16" stroke-linecap="round">
      <line x1="140" y1="152" x2="580" y2="152"/>
      <line x1="140" y1="208" x2="580" y2="208"/>
      <line x1="140" y1="264" x2="580" y2="264"/>
      <line x1="140" y1="320" x2="580" y2="320"/>
      <line x1="140" y1="376" x2="580" y2="376"/>
      <line x1="140" y1="432" x2="580" y2="432"/>
      <line x1="140" y1="488" x2="580" y2="488"/>
    </g>
    <g stroke="url(#weftHi)" stroke-width="5" stroke-linecap="round">
      <line x1="140" y1="147" x2="580" y2="147"/>
      <line x1="140" y1="203" x2="580" y2="203"/>
      <line x1="140" y1="259" x2="580" y2="259"/>
      <line x1="140" y1="315" x2="580" y2="315"/>
      <line x1="140" y1="371" x2="580" y2="371"/>
      <line x1="140" y1="427" x2="580" y2="427"/>
      <line x1="140" y1="483" x2="580" y2="483"/>
    </g>

    <g stroke="url(#warp)" stroke-width="16" stroke-linecap="round">
      <line x1="192" y1="100" x2="192" y2="540"/>
      <line x1="248" y1="100" x2="248" y2="540"/>
      <line x1="304" y1="100" x2="304" y2="540"/>
      <line x1="360" y1="100" x2="360" y2="540"/>
      <line x1="416" y1="100" x2="416" y2="540"/>
      <line x1="472" y1="100" x2="472" y2="540"/>
      <line x1="528" y1="100" x2="528" y2="540"/>
    </g>
    <g stroke="url(#warpHi)" stroke-width="5" stroke-linecap="round">
      <line x1="187" y1="100" x2="187" y2="540"/>
      <line x1="243" y1="100" x2="243" y2="540"/>
      <line x1="299" y1="100" x2="299" y2="540"/>
      <line x1="355" y1="100" x2="355" y2="540"/>
      <line x1="411" y1="100" x2="411" y2="540"/>
      <line x1="467" y1="100" x2="467" y2="540"/>
      <line x1="523" y1="100" x2="523" y2="540"/>
    </g>

    <g stroke="url(#weft)" stroke-width="16" stroke-linecap="round">
      <line x1="174" y1="152" x2="210" y2="152"/><line x1="286" y1="152" x2="322" y2="152"/><line x1="398" y1="152" x2="434" y2="152"/><line x1="510" y1="152" x2="546" y2="152"/>
      <line x1="230" y1="208" x2="266" y2="208"/><line x1="342" y1="208" x2="378" y2="208"/><line x1="454" y1="208" x2="490" y2="208"/>
      <line x1="174" y1="264" x2="210" y2="264"/><line x1="286" y1="264" x2="322" y2="264"/><line x1="398" y1="264" x2="434" y2="264"/><line x1="510" y1="264" x2="546" y2="264"/>
      <line x1="230" y1="320" x2="266" y2="320"/><line x1="342" y1="320" x2="378" y2="320"/><line x1="454" y1="320" x2="490" y2="320"/>
      <line x1="174" y1="376" x2="210" y2="376"/><line x1="286" y1="376" x2="322" y2="376"/><line x1="398" y1="376" x2="434" y2="376"/><line x1="510" y1="376" x2="546" y2="376"/>
      <line x1="230" y1="432" x2="266" y2="432"/><line x1="342" y1="432" x2="378" y2="432"/><line x1="454" y1="432" x2="490" y2="432"/>
      <line x1="174" y1="488" x2="210" y2="488"/><line x1="286" y1="488" x2="322" y2="488"/><line x1="398" y1="488" x2="434" y2="488"/><line x1="510" y1="488" x2="546" y2="488"/>
    </g>
    <g stroke="url(#weftHi)" stroke-width="5" stroke-linecap="round">
      <line x1="174" y1="147" x2="210" y2="147"/><line x1="286" y1="147" x2="322" y2="147"/><line x1="398" y1="147" x2="434" y2="147"/><line x1="510" y1="147" x2="546" y2="147"/>
      <line x1="230" y1="203" x2="266" y2="203"/><line x1="342" y1="203" x2="378" y2="203"/><line x1="454" y1="203" x2="490" y2="203"/>
      <line x1="174" y1="259" x2="210" y2="259"/><line x1="286" y1="259" x2="322" y2="259"/><line x1="398" y1="259" x2="434" y2="259"/><line x1="510" y1="259" x2="546" y2="259"/>
      <line x1="230" y1="315" x2="266" y2="315"/><line x1="342" y1="315" x2="378" y2="315"/><line x1="454" y1="315" x2="490" y2="315"/>
      <line x1="174" y1="371" x2="210" y2="371"/><line x1="286" y1="371" x2="322" y2="371"/><line x1="398" y1="371" x2="434" y2="371"/><line x1="510" y1="371" x2="546" y2="371"/>
      <line x1="230" y1="427" x2="266" y2="427"/><line x1="342" y1="427" x2="378" y2="427"/><line x1="454" y1="427" x2="490" y2="427"/>
      <line x1="174" y1="483" x2="210" y2="483"/><line x1="286" y1="483" x2="322" y2="483"/><line x1="398" y1="483" x2="434" y2="483"/><line x1="510" y1="483" x2="546" y2="483"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="660" y="308" font-size="180" font-weight="700" letter-spacing="-6" fill="url(#text)">loom</text>
    <text x="664" y="360" font-size="22" font-weight="500" letter-spacing="0.2" fill="#a5b4fc" opacity="0.9">Weaves Linear into your automated agent-team workflow.</text>
    <text x="664" y="396" font-size="17" font-weight="400" letter-spacing="2" fill="#6366f1" opacity="0.75">/work ISSUE-42  →  team meeting  →  PR</text>
  </g>
</svg>
